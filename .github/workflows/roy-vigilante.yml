# Roy Vigilante — Sentinel Omega corriendo en GitHub Actions (sin servidor)
#
# Cada 2 horas: restaura la memoria entrenada (cache), corre un ciclo con
# datos reales, publica estado/REPORTE.md al repo (visible en Working Copy
# y la app de GitHub) y manda alertas Telegram si hay secrets configurados.
#
# Secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID  → alertas al celular
#   OPENWEATHERMAP_KEY                    → desgasificación/atmósfera
#   NASA_API_KEY                          → asteroides NEO (opcional)
#
# NOTA: el cron solo corre en la rama default (main) — mergear el PR lo activa.

name: Roy Vigilante

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

concurrency:
  group: roy-vigilante
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ciclo:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENWEATHERMAP_KEY: ${{ secrets.OPENWEATHERMAP_KEY }}
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependencias
        run: pip install -r sentinel_omega/requirements.txt

      - name: Restaurar memoria (30 años + firmas)
        uses: actions/cache/restore@v4
        with:
          path: sentinel_omega/data/SENTINEL_OMEGA_PRO.db
          key: roy-db-${{ github.run_id }}
          restore-keys: roy-db-

      - name: Bootstrap (solo la primera vez, ~1h)
        run: |
          if [ ! -f sentinel_omega/data/SENTINEL_OMEGA_PRO.db ]; then
            echo "Sin memoria previa — backcast 30 años + entrenamiento de firmas"
            python sentinel_omega/launcher.py --backcast --entrenar --once
          else
            echo "Memoria restaurada del cache"
          fi

      - name: Ciclo de vigilancia
        run: |
          rm -f sentinel_omega/data/sentinel_omega.pid
          python sentinel_omega/launcher.py --once

      - name: Guardar memoria
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sentinel_omega/data/SENTINEL_OMEGA_PRO.db
          key: roy-db-${{ github.run_id }}

      - name: Publicar reporte al repo
        run: |
          python deploy/generar_reporte.py
          git config user.name "roy-vigilante"
          git config user.email "actions@users.noreply.github.com"
          git add estado/REPORTE.md
          if ! git diff --cached --quiet; then
            git commit -m "🌍 Reporte Roy $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
